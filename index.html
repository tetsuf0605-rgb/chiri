<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#15303a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="白地図クイズ">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<title>白地図クイズ</title>
<style>
  :root{
    --ink:#15303a; --paper:#f3eee2; --card:#fbf8f0; --line:#d9cfb8;
    --green:#3f6b5e; --marker:#d9483b; --ochre:#bd8627; --ok:#2f8f5b; --ng:#c0584a; --bg:#e7edee;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;
    -webkit-text-size-adjust:100%;overscroll-behavior:none;}
  .wrap{max-width:760px;margin:0 auto;padding:14px 14px 40px;}

  header{position:relative;overflow:hidden;border-radius:16px;background:var(--ink);color:#f3eee2;padding:16px 18px;margin-bottom:12px;}
  header .topo{position:absolute;inset:0;opacity:.16}
  header h1{position:relative;margin:0;font-size:20px;font-weight:800;letter-spacing:.06em}
  header p{position:relative;margin:4px 0 0;font-size:12px;opacity:.8;letter-spacing:.04em}
  header h1,header p{z-index:1}
  .modes{position:absolute;top:14px;right:14px;z-index:5;display:flex;gap:4px;background:rgba(255,255,255,.12);padding:4px;border-radius:999px}
  .modes button{border:0;background:transparent;color:#f3eee2;font:inherit;font-size:13px;font-weight:700;padding:6px 14px;border-radius:999px;cursor:pointer}
  .modes button.on{background:var(--paper);color:var(--ink)}

  /* 地方タブ */
  .tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .tabs button{border:1px solid var(--line);background:var(--card);color:var(--ink);font:inherit;font-weight:700;
    padding:9px 16px;border-radius:999px;cursor:pointer}
  .tabs button.on{background:var(--green);color:#fff;border-color:var(--green)}
  .tabs button.add{color:var(--green);border-style:dashed}

  .bar{display:flex;justify-content:space-between;align-items:center;margin:0 2px 10px;font-size:13px;font-weight:700;color:var(--green)}
  .bar .score{color:var(--ochre)}

  .mapcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:10px;box-shadow:0 1px 0 #fff inset,0 6px 20px rgba(21,48,58,.06)}
  .mapbox{position:relative;width:100%;border-radius:10px;overflow:hidden;background:var(--paper);display:flex}
  .mapbox img{width:100%;display:block;user-select:none;-webkit-user-drag:none}
  .pin{position:absolute;transform:translate(-50%,-50%);pointer-events:none}
  .pin .dot{width:11px;height:11px;border-radius:50%;background:var(--ink);opacity:.45;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .pin.active .target{position:relative;width:40px;height:40px;margin:-20px 0 0 -20px;left:50%;top:50%}
  .pin.active .ring{position:absolute;inset:0;border:3px solid var(--marker);border-radius:50%}
  .pin.active .ring.r2{inset:8px;border-width:2px;opacity:.6}
  .pin.active .cx,.pin.active .cy{position:absolute;background:var(--marker)}
  .pin.active .cx{left:50%;top:-7px;width:2px;height:54px;margin-left:-1px}
  .pin.active .cy{top:50%;left:-7px;height:2px;width:54px;margin-top:-1px}
  .pin.active .pulse{position:absolute;inset:0;border:3px solid var(--marker);border-radius:50%;animation:pulse 1.8s ease-out infinite}
  @keyframes pulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(2.4);opacity:0}}
  @media (prefers-reduced-motion:reduce){.pin.active .pulse{display:none}}
  .pin .num{position:absolute;top:-26px;left:50%;transform:translateX(-50%);background:var(--marker);color:#fff;font-size:12px;font-weight:800;border-radius:8px;padding:1px 7px;white-space:nowrap}

  .qtext{margin:14px 2px 6px;font-size:18px;font-weight:800;text-align:center}

  .writecard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:10px;margin-top:12px}
  .canvas-wrap{position:relative;background:#fffdf7;border:1px dashed var(--line);border-radius:10px;height:150px}
  .canvas-wrap::after{content:"ここに手書き";position:absolute;left:12px;top:8px;font-size:12px;color:#b9ac88;pointer-events:none}
  canvas{display:block;width:100%;height:100%;touch-action:none;border-radius:10px}
  .tools{display:flex;gap:8px;margin-top:8px}
  .tools button{flex:1;border:1px solid var(--line);background:#fff;color:var(--ink);font:inherit;font-weight:700;padding:9px;border-radius:10px;cursor:pointer}

  .btn{width:100%;border:0;background:var(--ink);color:#f3eee2;font:inherit;font-size:16px;font-weight:800;padding:14px;border-radius:12px;margin-top:12px;cursor:pointer;letter-spacing:.05em}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn.danger{background:#fff;color:var(--ng);border:1px solid var(--line)}

  .reveal{margin-top:12px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center}
  .reveal .lbl{font-size:12px;color:var(--green);font-weight:700;letter-spacing:.1em}
  .reveal .ans{font-size:30px;font-weight:800;margin:4px 0 12px}
  .judge{display:flex;gap:10px}
  .judge button{flex:1;border:0;font:inherit;font-size:16px;font-weight:800;padding:14px;border-radius:12px;cursor:pointer;color:#fff}
  .judge .ok{background:var(--ok)} .judge .ng{background:var(--ng)}

  .result{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;text-align:center}
  .result .big{font-size:44px;font-weight:800;color:var(--ochre)}
  .result .big small{font-size:20px;color:var(--ink);opacity:.6}
  .review{text-align:left;margin:16px 0;border-top:1px solid var(--line)}
  .review .row{display:flex;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px solid var(--line);font-size:15px}
  .review .row .mk{width:22px;text-align:center;font-weight:800}
  .review .row .a{font-weight:700;margin-left:auto}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px}
  .panel h2{margin:0 0 10px;font-size:15px;letter-spacing:.04em}
  .field{margin-bottom:10px}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--green);margin-bottom:4px}
  input[type=text]{width:100%;font:inherit;padding:10px;border:1px solid var(--line);border-radius:10px;background:#fff}
  .file-btn{display:inline-block;background:var(--ink);color:#f3eee2;font-weight:700;padding:10px 14px;border-radius:10px;cursor:pointer}
  .file-btn input{display:none}
  .hint{font-size:12px;color:#8a8064;margin-top:6px;line-height:1.6}
  .pinrow{display:grid;grid-template-columns:30px 1fr 1fr 36px;gap:8px;align-items:center;margin-bottom:8px}
  .pinrow .n{background:var(--marker);color:#fff;font-weight:800;text-align:center;border-radius:8px;padding:8px 0}
  .pinrow .del{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 0;cursor:pointer;font-weight:800;color:var(--ng)}
  textarea{width:100%;font:13px/1.5 ui-monospace,Menlo,monospace;padding:10px;border:1px solid var(--line);border-radius:10px;background:#fff;min-height:90px}
  .tap-hint{font-size:12px;color:var(--marker);font-weight:700;text-align:center;margin:8px 0 0}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <svg class="topo" viewBox="0 0 760 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" stroke="#f3eee2" stroke-width="1.4">
        <path d="M-10,40 C120,10 220,70 360,45 C520,16 600,80 780,48"/>
        <path d="M-10,62 C120,32 220,92 360,67 C520,38 600,102 780,70"/>
        <path d="M-10,84 C120,54 220,114 360,89 C520,60 600,124 780,92"/>
        <path d="M-10,18 C120,-12 220,48 360,23 C520,-6 600,58 780,26"/>
      </g>
    </svg>
    <div class="modes">
      <button id="mSolve" class="on">解く</button>
      <button id="mAuthor">作る</button>
    </div>
    <h1>白地図クイズ</h1>
    <p>地図のマークを見て、地名を手書き → 答え合わせ</p>
  </header>

  <!-- ===== 解く ===== -->
  <section id="solveView">
    <div class="tabs" id="regionTabs"></div>
    <div id="quizArea">
      <div class="bar"><span id="prog">1 / 1</span><span class="score">スコア <span id="score">0</span></span></div>
      <div class="mapcard"><div class="mapbox" id="mapbox"><img id="mapimg" alt="地図"></div></div>
      <div class="qtext" id="qtext">問題</div>
      <div class="writecard" id="writecard">
        <div class="canvas-wrap"><canvas id="pad"></canvas></div>
        <div class="tools"><button id="undo">ひとつ戻す</button><button id="clear">ぜんぶ消す</button></div>
        <button class="btn" id="check">答え合わせ</button>
      </div>
      <div class="reveal hidden" id="reveal">
        <div class="lbl">せいかい</div>
        <div class="ans" id="ansText">—</div>
        <div class="judge"><button class="ng" id="jNg">✕ まちがえた</button><button class="ok" id="jOk">○ できた</button></div>
      </div>
    </div>
    <div class="result hidden" id="resultArea">
      <div class="lbl" style="color:var(--green);font-weight:700;letter-spacing:.1em">けっか</div>
      <div class="big"><span id="rScore">0</span><small> / <span id="rTotal">0</span></small></div>
      <div class="review" id="review"></div>
      <button class="btn" id="again">もう一度</button>
    </div>
  </section>

  <!-- ===== 作る ===== -->
  <section id="authorView" class="hidden">
    <div class="tabs" id="editTabs"></div>
    <div class="panel">
      <h2>1. 地図とタイトル</h2>
      <div class="field"><label>タイトル（地方名）</label><input type="text" id="aTitle" placeholder="例：中部地方"></div>
      <label class="file-btn">地図の画像を選ぶ<input type="file" id="aFile" accept="image/*"></label>
      <div class="hint">著作権フリーの白地図（国土地理院の白地図、自作SVGなど）を使ってください。大きい画像は自動で縮小して保存します。</div>
    </div>
    <div class="panel">
      <h2>2. マークを置く・直す</h2>
      <div class="mapbox" id="aMapbox" style="border:1px solid var(--line);border-radius:10px"><img id="aMapimg" alt="地図"></div>
      <p class="tap-hint">地図をタップ＝マーク追加／マークをドラッグ＝位置を直す</p>
      <div id="aList" style="margin-top:12px"></div>
    </div>
    <div class="panel">
      <h2>3. 解く・共有</h2>
      <button class="btn" id="aPlay">▶ この地図を解く</button>
      <button class="btn ghost" id="aExport">データを書き出す（JSON）</button>
      <textarea id="aJson" class="hidden" placeholder="ここにJSONが出ます／貼り付けて読み込み"></textarea>
      <button class="btn ghost hidden" id="aImport">貼り付けたデータを読み込む</button>
      <button class="btn danger" id="aDelete">この地図を削除</button>
      <button class="btn danger" id="aReset">↺ 最初のサンプルに戻す</button>
    </div>
  </section>

</div>

function loadSets(){
  try{ const v=localStorage.getItem(LS); if(v){ const a=JSON.parse(v); if(Array.isArray(a)&&a.length) return a; } }catch(e){}
  return clone(DEFAULT_SETS);
}

/* ===== 手書きキャンバス ===== */
function Pad(canvas){
  const ctx=canvas.getContext("2d"); let strokes=[],cur=null,dpr=1;
  function fit(){ const r=canvas.getBoundingClientRect(); dpr=window.devicePixelRatio||1;
    canvas.width=Math.round(r.width*dpr); canvas.height=Math.round(r.height*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0); ctx.lineCap="round"; ctx.lineJoin="round"; ctx.lineWidth=3.4; ctx.strokeStyle="#1c2b33"; redraw(); }
  function pos(e){ const r=canvas.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; }
  function redraw(){ ctx.save();ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,canvas.width,canvas.height);ctx.restore();
    for(const s of strokes){ if(s.length<2){ if(s[0]){ctx.beginPath();ctx.arc(s[0].x,s[0].y,1.8,0,7);ctx.fillStyle="#1c2b33";ctx.fill();} continue; }
      ctx.beginPath();ctx.moveTo(s[0].x,s[0].y);for(let i=1;i<s.length;i++)ctx.lineTo(s[i].x,s[i].y);ctx.stroke(); } }
  canvas.addEventListener("pointerdown",e=>{e.preventDefault();canvas.setPointerCapture(e.pointerId);cur=[pos(e)];strokes.push(cur);redraw();});
  canvas.addEventListener("pointermove",e=>{if(!cur)return;e.preventDefault();const p=pos(e),l=cur[cur.length-1];cur.push(p);ctx.beginPath();ctx.moveTo(l.x,l.y);ctx.lineTo(p.x,p.y);ctx.stroke();});
  const end=()=>{cur=null;};
  ["pointerup","pointercancel","pointerleave"].forEach(ev=>canvas.addEventListener(ev,end));
  window.addEventListener("resize",fit);
  return { fit, clear(){strokes=[];redraw();}, undo(){strokes.pop();redraw();} };
}
const pad = Pad($("#pad"));

/* ===== マーカー描画 ===== */
function renderPins(box,list,activeIndex,author){
  box.querySelectorAll(".pin").forEach(p=>p.remove());
  list.forEach((q,i)=>{
    const el=document.createElement("div");
    el.className="pin"+(i===activeIndex?" active":"");
    el.style.left=(q.x*100)+"%"; el.style.top=(q.y*100)+"%";
    if(author){ el.dataset.i=i; el.style.pointerEvents="auto"; el.style.cursor="grab";
      el.innerHTML='<div class="dot" style="opacity:1;background:var(--marker)"></div><div class="num">'+(i+1)+'</div>'; }
    else if(i===activeIndex){ el.innerHTML='<div class="target"><div class="pulse"></div><div class="ring"></div><div class="ring r2"></div><div class="cx"></div><div class="cy"></div></div>'; }
    else { el.innerHTML='<div class="dot"></div>'; }
    box.appendChild(el);
  });
}

/* ===== 解くモード ===== */
let qi=0,score=0,results=[];
function renderRegionTabs(){
  const box=$("#regionTabs"); box.innerHTML="";
  sets.forEach(s=>{ const b=document.createElement("button"); b.textContent=s.title;
    if(s.id===solveId)b.className="on"; b.onclick=()=>{solveId=s.id;renderRegionTabs();startQuiz();}; box.appendChild(b); });
}
function curQuiz(){ return getSet(solveId); }
function startQuiz(){
  qi=0;score=0;results=[];
  const q=curQuiz(); $("#mapimg").src=q.mapSrc;
  $("#resultArea").classList.add("hidden"); $("#quizArea").classList.remove("hidden");
  showQuestion();
}
function showQuestion(){
  const set=curQuiz(), q=set.questions[qi];
  $("#prog").textContent=set.title+"　"+(qi+1)+" / "+set.questions.length;
  $("#score").textContent=score;
  $("#qtext").textContent=(qi+1)+". "+q.prompt;
  renderPins($("#mapbox"),set.questions,qi,false);
  $("#reveal").classList.add("hidden"); $("#writecard").classList.remove("hidden");
  requestAnimationFrame(()=>pad.fit()); pad.clear();
}
$("#undo").onclick=()=>pad.undo();
$("#clear").onclick=()=>pad.clear();
$("#check").onclick=()=>{ $("#ansText").textContent=curQuiz().questions[qi].answer||"（未設定）";
  $("#writecard").classList.add("hidden"); $("#reveal").classList.remove("hidden"); };
function judge(ok){ const q=curQuiz().questions[qi]; if(ok)score++;
  results.push({prompt:q.prompt,answer:q.answer,ok}); qi++;
  if(qi>=curQuiz().questions.length) endQuiz(); else showQuestion(); }
$("#jOk").onclick=()=>judge(true);
$("#jNg").onclick=()=>judge(false);
function endQuiz(){
  $("#quizArea").classList.add("hidden"); $("#resultArea").classList.remove("hidden");
  $("#rScore").textContent=score; $("#rTotal").textContent=curQuiz().questions.length;
  $("#review").innerHTML=results.map(r=>'<div class="row"><span class="mk" style="color:'+(r.ok?'var(--ok)':'var(--ng)')+'">'+(r.ok?'○':'✕')+'</span><span style="color:#8a8064">'+r.prompt+'</span><span class="a">'+r.answer+'</span></div>').join("");
}
$("#again").onclick=startQuiz;

/* ===== 作るモード ===== */
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;"); }
function renderEditTabs(){
  const box=$("#editTabs"); box.innerHTML="";
  sets.forEach(s=>{ const b=document.createElement("button"); b.textContent=s.title;
    if(s.id===editId)b.className="on"; b.onclick=()=>{editId=s.id;openAuthor();}; box.appendChild(b); });
  const add=document.createElement("button"); add.textContent="＋ 新しい地図"; add.className="add";
  add.onclick=()=>{ const id="map"+Date.now(); sets.push({id,title:"新しい地図",mapSrc:"",questions:[]}); editId=id; persist(); openAuthor(); };
  box.appendChild(add);
}
function openAuthor(){
  renderEditTabs(); const s=getSet(editId);
  $("#aTitle").value=s.title||""; $("#aMapimg").src=s.mapSrc||"";
  renderPinList(); renderAuthorPins();
  $("#aJson").classList.add("hidden"); $("#aImport").classList.add("hidden");
}
function renderAuthorPins(){ renderPins($("#aMapbox"),getSet(editId).questions,-1,true); }
function renderPinList(){
  const s=getSet(editId);
  $("#aList").innerHTML = s.questions.map((q,i)=>'<div class="pinrow"><div class="n">'+(i+1)+'</div>'
    +'<input data-k="prompt" data-i="'+i+'" value="'+esc(q.prompt)+'" placeholder="問題文">'
    +'<input data-k="answer" data-i="'+i+'" value="'+esc(q.answer)+'" placeholder="正解">'
    +'<button class="del" data-d="'+i+'">×</button></div>').join("")
    || '<p class="hint">地図をタップしてマークを追加してください。</p>';
  $("#aList").querySelectorAll("input").forEach(inp=>{
    inp.oninput=()=>{ s.questions[+inp.dataset.i][inp.dataset.k]=inp.value; };
    inp.onchange=persist;
  });
  $("#aList").querySelectorAll(".del").forEach(b=>{
    b.onclick=()=>{ s.questions.splice(+b.dataset.d,1); persist(); renderPinList(); renderAuthorPins(); };
  });
}
$("#aTitle").oninput=e=>{ getSet(editId).title=e.target.value; renderEditTabs(); };
$("#aTitle").onchange=persist;

/* 画像読み込み（自動縮小） */
$("#aFile").onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const img=new Image();
  img.onload=()=>{ const maxW=1600,sc=Math.min(1,maxW/img.width),c=document.createElement("canvas");
    c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
    c.getContext("2d").drawImage(img,0,0,c.width,c.height);
    getSet(editId).mapSrc=c.toDataURL("image/jpeg",0.85);
    $("#aMapimg").src=getSet(editId).mapSrc; persist(); renderAuthorPins(); };
  img.src=URL.createObjectURL(f);
};

/* マーク追加・ドラッグ移動 */
const aBox=$("#aMapbox"); let dragIdx=-1;
aBox.addEventListener("pointerdown",e=>{ const pin=e.target.closest(".pin"); if(!pin)return;
  dragIdx=+pin.dataset.i; aBox.setPointerCapture(e.pointerId); e.preventDefault(); });
aBox.addEventListener("pointermove",e=>{ if(dragIdx<0)return; e.preventDefault();
  const r=$("#aMapimg").getBoundingClientRect();
  let x=(e.clientX-r.left)/r.width, y=(e.clientY-r.top)/r.height;
  x=Math.min(1,Math.max(0,x)); y=Math.min(1,Math.max(0,y));
  const q=getSet(editId).questions[dragIdx]; q.x=+x.toFixed(4); q.y=+y.toFixed(4);
  const el=aBox.querySelectorAll(".pin")[dragIdx]; if(el){el.style.left=(x*100)+"%";el.style.top=(y*100)+"%";} });
aBox.addEventListener("pointerup",()=>{ if(dragIdx>=0){dragIdx=-1;persist();} });
aBox.addEventListener("pointercancel",()=>{dragIdx=-1;});
aBox.addEventListener("click",e=>{ if(e.target.closest(".pin"))return;
  const s=getSet(editId); if(!s.mapSrc){alert("先に地図の画像を選んでください");return;}
  const r=$("#aMapimg").getBoundingClientRect();
  const x=(e.clientX-r.left)/r.width, y=(e.clientY-r.top)/r.height;
  if(x<0||x>1||y<0||y>1)return;
  s.questions.push({x:+x.toFixed(4),y:+y.toFixed(4),prompt:"この地形の名前は？",answer:""});
  persist(); renderPinList(); renderAuthorPins(); });

$("#aPlay").onclick=()=>{ const s=getSet(editId);
  if(!s.mapSrc){alert("地図の画像がありません");return;}
  if(!s.questions.length){alert("マークを1つ以上置いてください");return;}
  solveId=editId; switchMode("solve"); };
$("#aExport").onclick=()=>{ const ta=$("#aJson"); ta.classList.remove("hidden"); $("#aImport").classList.remove("hidden");
  const s=getSet(editId); ta.value=JSON.stringify({title:s.title,mapSrc:s.mapSrc,questions:s.questions}); ta.select(); };
$("#aImport").onclick=()=>{ try{ const o=JSON.parse($("#aJson").value); if(!o.questions)throw 0;
  const s=getSet(editId); s.title=o.title||s.title; s.mapSrc=o.mapSrc||s.mapSrc; s.questions=o.questions;
  persist(); openAuthor(); alert("読み込みました"); }catch(e){ alert("JSONの形式が正しくありません"); } };
$("#aDelete").onclick=()=>{ if(sets.length<=1){alert("最後の1つは削除できません");return;}
  if(!confirm("「"+getSet(editId).title+"」を削除しますか？"))return;
  sets=sets.filter(s=>s.id!==editId); editId=sets[0].id; solveId=sets[0].id; persist(); openAuthor(); };
$("#aReset").onclick=()=>{ if(!confirm("編集内容をすべて消して、最初のサンプル（中部・関東）に戻します。よろしいですか？"))return;
  localStorage.removeItem(LS); sets=clone(DEFAULT_SETS); editId=sets[0].id; solveId=sets[0].id; openAuthor(); };

/* ===== モード切替 ===== */
function switchMode(m){
  const solve=m==="solve";
  $("#mSolve").classList.toggle("on",solve); $("#mAuthor").classList.toggle("on",!solve);
  $("#solveView").classList.toggle("hidden",!solve); $("#authorView").classList.toggle("hidden",solve);
  if(solve){ renderRegionTabs(); startQuiz(); } else { openAuthor(); }
}
$("#mSolve").onclick=()=>switchMode("solve");
$("#mAuthor").onclick=()=>switchMode("author");

/* 起動 */
renderRegionTabs(); startQuiz();
</script>
</body>
</html>
